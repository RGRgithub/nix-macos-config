server:
  port: 3000
  assets-path: /Users/sam-com/.config/glance/assets

theme:
  custom-css-file: /assets/user.css

pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 24h

          - type: bookmarks
            groups:
              - title: Development
                links:
                  - title: GitHub
                    url: https://github.com/RGRgithub
                    icon: di:github-light
                  - title: Claude
                    url: https://claude.ai/new
                    icon: di:claude-ai
                  - title: RosterStream
                    url: https://app.us-east-1.rosterstream.com/apps
                    icon: https://app.us-east-1.rosterstream.com/favicon.ico
              - title: Projects
                links:
                  - title: Asana
                    url: https://app.asana.com/1/1122616867056860/home
                    icon: di:asana
                  - title: Miro
                    url: https://miro.com/app/dashboard/
                    icon: di:miro
                  - title: Jira
                    url: https://rgrc-sandbox.atlassian.net/jira/projects?page=1&sortKey=name&sortOrder=ASC
                    icon: di:jira
              - title: RGR
                links:
                  - title: ClassLink
                    url: https://partnerportal.classlink.com/my-apps
                    icon: https://www.google.com/s2/favicons?domain=classlink.com&sz=64
                  - title: Clever
                    url: https://apps.clever.com/rgr
                    icon: https://www.google.com/s2/favicons?domain=clever.com&sz=64
                  - title: RGR Admin
                    url: https://admin.demo.reallygreatreading.com/
                    icon: https://www.google.com/s2/favicons?domain=reallygreatreading.com&sz=64
                  - title: RGR Playground
                    url: https://playground.reallygreatreading.com/
                    icon: https://cdn-cf.rgr.fun/s/4-20-4/educator/img/favicon.ico

      - size: full
        widgets:
          - type: search
            search-engine: google
            new-tab: true

          - type: custom-api
            title: My Pull Requests
            cache: 10m
            url: "https://api.github.com/search/issues?q=is:pr+is:open+assignee:scomeau-rgr&per_page=20"
            headers:
              Authorization: Bearer ${GITHUB_TOKEN}
              Accept: application/vnd.github+json
            subrequests:
              review-requested:
                url: "https://api.github.com/search/issues?q=is:pr+is:open+review-requested:scomeau-rgr&per_page=20"
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
              changes-requested:
                url: "https://api.github.com/search/issues?q=is:pr+is:open+author:scomeau-rgr+review:changes_requested&per_page=20"
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
            template: |
              <div style="margin-bottom: 0.75rem;">
                <a href="https://github.com/pulls/review-requested" target="_blank" class="color-subdue size-h6">View all on GitHub →</a>
              </div>
              {{ range .JSON.Array "items" }}
              <div style="margin-bottom: 0.5rem;">
                <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a>
                <div class="size-h6 color-subdue">{{ .String "repository_url" | findSubmatch "repos/[^/]+/([^/]+)$" }} &mdash; by {{ .String "user.login" }}</div>
              </div>
              {{ end }}
              {{ range (.Subrequest "review-requested").JSON.Array "items" }}
              <div style="margin-bottom: 0.5rem;">
                <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a>
                <div class="size-h6 color-subdue">{{ .String "repository_url" | findSubmatch "repos/[^/]+/([^/]+)$" }} &mdash; by {{ .String "user.login" }}</div>
              </div>
              {{ end }}
              {{ if (.Subrequest "changes-requested").JSON.Array "items" }}
              <div class="size-h6 color-subdue" style="margin-top: 0.75rem; margin-bottom: 0.3rem;">CHANGES REQUESTED</div>
              {{ range (.Subrequest "changes-requested").JSON.Array "items" }}
              <div style="margin-bottom: 0.5rem;">
                <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a>
                <div class="size-h6 color-subdue">{{ .String "repository_url" | findSubmatch "repos/[^/]+/([^/]+)$" }} &mdash; by {{ .String "user.login" }}</div>
              </div>
              {{ end }}
              {{ end }}

          - type: custom-api
            title: Repositories
            cache: 10m
            url: https://api.github.com/search/issues?q=is:pr+is:open+repo:RGRgithub/nix-macos-config&per_page=10
            headers:
              Authorization: Bearer ${GITHUB_TOKEN}
              Accept: application/vnd.github+json
            subrequests:
              nix-issues:
                url: https://api.github.com/search/issues?q=is:issue+is:open+repo:RGRgithub/nix-macos-config&per_page=10
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
              rostering-prs:
                url: https://api.github.com/search/issues?q=is:pr+is:open+repo:RGRgithub/rgr-rostering&per_page=10
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
              rostering-issues:
                url: https://api.github.com/search/issues?q=is:issue+is:open+repo:RGRgithub/rgr-rostering&per_page=10
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
              claude-prs:
                url: https://api.github.com/search/issues?q=is:pr+is:open+repo:RGRgithub/rgr-claude&per_page=10
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
              claude-issues:
                url: https://api.github.com/search/issues?q=is:issue+is:open+repo:RGRgithub/rgr-claude&per_page=10
                headers:
                  Authorization: Bearer ${GITHUB_TOKEN}
                  Accept: application/vnd.github+json
            template: |
              <div style="margin-bottom: 1.2rem;">
                <div style="display: flex; align-items: center; gap: 0.4rem;">
                  <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/github-light.png" style="width: 1.4rem; height: 1.4rem;">
                  <a href="https://github.com/RGRgithub/nix-macos-config" target="_blank" class="color-highlight size-h3" style="font-weight: 700;">nix-macos-config</a>
                </div>
                <div style="margin-top: 0.4rem;">
                  {{ range .JSON.Array "items" }}
                  <div style="margin-bottom: 0.3rem;"><span class="size-h6 color-subdue">PR &mdash;</span> <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a></div>
                  {{ end }}
                  {{ range (.Subrequest "nix-issues").JSON.Array "items" }}
                  <div style="margin-bottom: 0.3rem;"><span class="size-h6 color-subdue">Issue &mdash;</span> <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a></div>
                  {{ end }}
                </div>
              </div>
              <div style="margin-bottom: 1.2rem;">
                <div style="display: flex; align-items: center; gap: 0.4rem;">
                  <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/github-light.png" style="width: 1.4rem; height: 1.4rem;">
                  <a href="https://github.com/RGRgithub/rgr-rostering" target="_blank" class="color-highlight size-h3" style="font-weight: 700;">rgr-rostering</a>
                </div>
                <div style="margin-top: 0.4rem;">
                  {{ range (.Subrequest "rostering-prs").JSON.Array "items" }}
                  <div style="margin-bottom: 0.3rem;"><span class="size-h6 color-subdue">PR &mdash;</span> <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a></div>
                  {{ end }}
                  {{ range (.Subrequest "rostering-issues").JSON.Array "items" }}
                  <div style="margin-bottom: 0.3rem;"><span class="size-h6 color-subdue">Issue &mdash;</span> <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a></div>
                  {{ end }}
                </div>
              </div>
              <div>
                <div style="display: flex; align-items: center; gap: 0.4rem;">
                  <img src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/github-light.png" style="width: 1.4rem; height: 1.4rem;">
                  <a href="https://github.com/RGRgithub/rgr-claude" target="_blank" class="color-highlight size-h3" style="font-weight: 700;">rgr-claude</a>
                </div>
                <div style="margin-top: 0.4rem;">
                  {{ range (.Subrequest "claude-prs").JSON.Array "items" }}
                  <div style="margin-bottom: 0.3rem;"><span class="size-h6 color-subdue">PR &mdash;</span> <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a></div>
                  {{ end }}
                  {{ range (.Subrequest "claude-issues").JSON.Array "items" }}
                  <div style="margin-bottom: 0.3rem;"><span class="size-h6 color-subdue">Issue &mdash;</span> <a href="{{ .String "html_url" }}" target="_blank" class="color-highlight">{{ .String "title" }}</a></div>
                  {{ end }}
                </div>
              </div>

      - size: small
        widgets:
          - type: server-stats
            servers:
              - type: local
                name: Local
                hide-mountpoints-by-default: true
                mountpoints:
                  /System/Volumes/Data:
                    name: Disk
                    hide: false

          - type: monitor
            title: Services
            cache: 1s
            sites:
              - title: pgAdmin
                url: http://localhost:5050
                icon: di:pgadmin
              - title: RS Reconciler
                url: http://localhost:8081/health
                icon: di:google-cloud-platform
              - title: RS Ingestor
                url: http://localhost:8080/health
                icon: di:google-cloud-platform
              - title: RGR Batcave
                url: http://localhost:5173
                check-url: http://localhost:3001/health
                icon: http://localhost:5173/favicon.ico
